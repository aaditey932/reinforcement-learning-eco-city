# PPO config for the Eco-City planner behaviour.
#
# Adapted from the ML-Agents Crawler example (see
# `My project/rl-repos/ml-agents/config/ppo/Crawler.yaml`) for a discrete
# action space with action masking. The behaviour name MUST match the
# BehaviorParameters.BehaviorName set by the Unity component.

behaviors:
  TerrainCityPlanner:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 400
    summary_freq: 10000
